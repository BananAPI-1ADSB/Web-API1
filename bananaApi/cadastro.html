  <div class="login">
    <div class="container">
      <div class="card card-cadastro">
        <h2>Criar Conta</h2>
        <form class="formulario">
          <div class="campo">
            <label for="nome_cadastro">Nome Completo:</label>
            <input id="nome_cadastro" type="text" placeholder="Seu nome completo" />
          </div>
          <div class="campo">
            <label for="email_cadastro">E-mail:</label>
            <input id="email_cadastro" type="email" placeholder="seuemail@provedor.com" />
          </div>
          <div class="campo">
            <label for="empresa_cadastro">Empresa:</label>
            <input id="empresa_cadastro" type="text" placeholder="Nome da sua empresa" />
          </div>
          <div class="campo">
            <label for="telefone_cadastro">Telefone:</label>
            <input id="telefone_cadastro" type="tel" placeholder="(XX) 9XXXX-XXXX" />
          </div>
          <div class="campo">
            <label for="senha_cadastro">Senha:</label>
            <input id="senha_cadastro" type="password" placeholder="••••••" />
          </div>
          <div class="campo">
            <label for="confirmacao_senha_cadastro">Confirmação da Senha:</label>
            <input id="confirmacao_senha_cadastro" type="password" placeholder="••••••" />
          </div>
          <button type="submit" class="botao">Criar Conta</button>
          <p class="login-link">Já possui conta? <a href="login.html">Faça login aqui</a></p>
        </form>
      </div>
    </div>
  </div>
</body>
