<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard BananaAPI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    

<div class="wrapper-pagina-toda">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">Banana<span>API</span></h2>
    <ul class="menu">
      <li><a class="active" href="#">Dashboard</a></li>
      <!--<li><a href="#">Temperatura</a></li>
      <li><a href="#">Alertas</a></li>
      <li><a href="#">Relatórios</a></li>-->
      <li class="botao-sair"><a href="home.html">Sair</a></li>
    </ul>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <!-- HEADER -->
    <div class="topbar">
      <h1>Dashboard</h1>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <h3>Temperatura atual</h3>
        <p class="valor">18°C</p>
      </div>

      <div class="card">
        <h3>Status</h3>
        <p class="valor verde">Estável</p>
      </div>

      <div class="card">
        <h3>Alertas</h3>
        <p class="valor vermelho">2 riscos</p>
      </div>

      <div class="card">
        <h3>Lotes monitorados</h3>
        <p class="valor">12</p>
      </div>

    </div>

    <!-- GRÁFICO FAKE -->
    <div class="grafico">
      <h3>Variação de Temperatura</h3>

      <div class="barras">
        <div class="barra" style="height: 40%"></div>
        <div class="barra" style="height: 60%"></div>
        <div class="barra" style="height: 50%"></div>
        <div class="barra" style="height: 80%"></div>
        <div class="barra" style="height: 65%"></div>
        <div class="barra" style="height: 90%"></div>
      </div>

    </div>

  </main>

</div>

</body>
</html>
