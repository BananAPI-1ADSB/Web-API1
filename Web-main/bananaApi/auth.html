<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>BananaAPI - Autenticação</title>
    <style>
      .form-hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
    <div class="container">
      <a href="home.html">
        <h1 class="titulo">BananaAPI</h1>
      </a>
      <ul class="navbar">
        <li>
          <span><a href="home.html">Inicial</a></span>
        </li>
        <li>|</li>
        <li>
          <span><a href="calculadora.html">Financeiro</a></span>
        </li>
        <li>|</li>
        <li>
          <span><a href="">Monitoramento</a></span>
        </li>      
      </ul>
    </div>
  </div>

  <div class="login">
    <div class="container">
      <div class="card card-cadastro">

        <!-- CADASTRO -->
        <div id="form_cadastro">
          <h2>Criar Conta</h2>
          <div class="formulario">
            <div class="campo">
              <label for="nome_cadastro">Nome Completo:</label>
              <input id="nome_cadastro" type="text" placeholder="Seu nome completo" oninput="limparErro('nome_cadastro')" />
              <span class="erro" id="erro_nome_cadastro"></span>
            </div>
            <div class="campo">
              <label for="email_cadastro">E-mail:</label>
              <input id="email_cadastro" type="email" placeholder="seuemail@provedor.com" oninput="limparErro('email_cadastro')" />
              <span class="erro" id="erro_email_cadastro"></span>
            </div>
            <div class="campo">
              <label for="empresa_cadastro">Empresa:</label>
              <input id="empresa_cadastro" type="text" placeholder="Nome da sua empresa" oninput="limparErro('empresa_cadastro')" />
              <span class="erro" id="erro_empresa_cadastro"></span>
            </div>
            <div class="campo">
              <label for="telefone_cadastro">Telefone:</label>
              <input id="telefone_cadastro" type="tel" placeholder="(XX) 9XXXX-XXXX" oninput="limparErro('telefone_cadastro')" />
              <span class="erro" id="erro_telefone_cadastro"></span>
            </div>
            <div class="campo">
              <label for="senha_cadastro">Senha:</label>
              <input id="senha_cadastro" type="password" placeholder="••••••" oninput="limparErro('senha_cadastro')" />
              <span class="erro" id="erro_senha_cadastro"></span>
            </div>
            <div class="campo">
              <label for="confirmacao_senha_cadastro">Confirmação da Senha:</label>
              <input id="confirmacao_senha_cadastro" type="password" placeholder="••••••" oninput="limparErro('confirmacao_cadastro')" />
              <span class="erro" id="erro_confirmacao_cadastro"></span>
            </div>
            <button type="button" class="botao" onclick="validarCadastro()">Criar Conta</button>
            <p class="login-link">Já possui conta? <a href="javascript:alternarForm()">Faça login aqui</a></p>
          </div>
        </div>

        <!-- LOGIN -->
        <div id="form_login" class="form-hidden">
          <h2>Bem-vindo!</h2>
          <div class="formulario">
            <div class="campo">
              <label for="email_login">E-mail:</label>
              <input id="email_login" type="email" placeholder="meuemail@provedor.com" oninput="limparErro('email_login')" />
              <span class="erro" id="erro_email_login"></span>
            </div>
            <div class="campo">
              <label for="senha_login">Senha:</label>
              <input id="senha_login" type="password" placeholder="••••••" oninput="limparErro('senha_login')" />
              <span class="erro" id="erro_senha_login"></span>
            </div>
            <button type="button" class="botao" onclick="validarLogin()">Fazer Login</button>
            <p class="login-link">Não possui conta? <a href="javascript:alternarForm()">Cadastre-se aqui</a></p>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
  let usuarioRegistrado = null;

  function alternarForm() {
    document.getElementById('form_cadastro').classList.toggle('form-hidden');
    document.getElementById('form_login').classList.toggle('form-hidden');
  }

  function limparErro(campo) {
    const erroId = `erro_${campo}`;
    window[erroId].textContent = '';
    if (window[campo]) {
      window[campo].classList.remove('input-erro');
    }
  }

  function validarCadastro() {
    let isValido = true;

    // Validar nome
    if (nome_cadastro.value.trim() === '') {
      erro_nome_cadastro.textContent = 'Nome é obrigatório';
      nome_cadastro.classList.add('input-erro');
      isValido = false;
    } else if (nome_cadastro.value.trim().length < 3) {
      erro_nome_cadastro.textContent = 'Nome deve ter pelo menos 3 caracteres';
      nome_cadastro.classList.add('input-erro');
      isValido = false;
    } else {
      erro_nome_cadastro.textContent = '';
      nome_cadastro.classList.remove('input-erro');
    }

    // Validar email
    if (email_cadastro.value.trim() === '') {
      erro_email_cadastro.textContent = 'E-mail é obrigatório';
      email_cadastro.classList.add('input-erro');
      isValido = false;
    } else if (!email_cadastro.value.includes('@') || !email_cadastro.value.includes('.')) {
      erro_email_cadastro.textContent = 'E-mail inválido';
      email_cadastro.classList.add('input-erro');
      isValido = false;
    } else {
      erro_email_cadastro.textContent = '';
      email_cadastro.classList.remove('input-erro');
    }

    // Validar empresa
    if (empresa_cadastro.value.trim() === '') {
      erro_empresa_cadastro.textContent = 'Empresa é obrigatória';
      empresa_cadastro.classList.add('input-erro');
      isValido = false;
    } else {
      erro_empresa_cadastro.textContent = '';
      empresa_cadastro.classList.remove('input-erro');
    }

    // Validar telefone
    if (telefone_cadastro.value.trim() === '') {
      erro_telefone_cadastro.textContent = 'Telefone é obrigatório';
      telefone_cadastro.classList.add('input-erro');
      isValido = false;
    } else if (telefone_cadastro.value.trim().length < 10) {
      erro_telefone_cadastro.textContent = 'Telefone inválido';
      telefone_cadastro.classList.add('input-erro');
      isValido = false;
    } else {
      erro_telefone_cadastro.textContent = '';
      telefone_cadastro.classList.remove('input-erro');
    }

    // Validar senha
    if (senha_cadastro.value === '') {
      erro_senha_cadastro.textContent = 'Senha é obrigatória';
      senha_cadastro.classList.add('input-erro');
      isValido = false;
    } else if (senha_cadastro.value.length < 6) {
      erro_senha_cadastro.textContent = 'Senha deve ter pelo menos 6 caracteres';
      senha_cadastro.classList.add('input-erro');
      isValido = false;
    } else {
      erro_senha_cadastro.textContent = '';
      senha_cadastro.classList.remove('input-erro');
    }

    // Validar confirmação de senha
    if (confirmacao_senha_cadastro.value === '') {
      erro_confirmacao_cadastro.textContent = 'Confirmação de senha é obrigatória';
      confirmacao_senha_cadastro.classList.add('input-erro');
      isValido = false;
    } else if (confirmacao_senha_cadastro.value !== senha_cadastro.value) {
      erro_confirmacao_cadastro.textContent = 'As senhas não conferem';
      confirmacao_senha_cadastro.classList.add('input-erro');
      isValido = false;
    } else {
      erro_confirmacao_cadastro.textContent = '';
      confirmacao_senha_cadastro.classList.remove('input-erro');
    }

    if (isValido) {
      usuarioRegistrado = {
        email: email_cadastro.value.trim(),
        senha: senha_cadastro.value
      };
      alert('Conta criada com sucesso!');
      alternarForm();
      
      // Limpar formulário de cadastro
      nome_cadastro.value = '';
      email_cadastro.value = '';
      empresa_cadastro.value = '';
      telefone_cadastro.value = '';
      senha_cadastro.value = '';
      confirmacao_senha_cadastro.value = '';
    }
  }

  function validarLogin() {
    let isValido = true;

    // Validar email
    if (email_login.value.trim() === '') {
      erro_email_login.textContent = 'E-mail é obrigatório';
      email_login.classList.add('input-erro');
      isValido = false;
    } else if (!email_login.value.includes('@') || !email_login.value.includes('.')) {
      erro_email_login.textContent = 'E-mail inválido';
      email_login.classList.add('input-erro');
      isValido = false;
    } else {
      erro_email_login.textContent = '';
      email_login.classList.remove('input-erro');
    }

    // Validar senha
    if (senha_login.value === '') {
      erro_senha_login.textContent = 'Senha é obrigatória';
      senha_login.classList.add('input-erro');
      isValido = false;
    } else {
      erro_senha_login.textContent = '';
      senha_login.classList.remove('input-erro');
    }

    if (isValido) {
      if (!usuarioRegistrado) {
        erro_email_login.textContent = 'Nenhuma conta cadastrada encontrada';
        email_login.classList.add('input-erro');
        return;
      }

      if (email_login.value.trim() === usuarioRegistrado.email && senha_login.value === usuarioRegistrado.senha) {
        alert('Login realizado com sucesso!');
        window.location.href = 'dashboard.html';
      } else {
        erro_email_login.textContent = 'E-mail ou senha incorretos';
        email_login.classList.add('input-erro');
        erro_senha_login.textContent = 'E-mail ou senha incorretos';
        senha_login.classList.add('input-erro');
      }
    }
  }
</script>

</body>
</html>
